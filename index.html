<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <title>שערי חליפין</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="שערי חליפין" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .app { width: 100%; max-width: 400px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    #update-time { font-size: 12px; color: #888; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #e8e8e4; padding: 1.25rem; margin-bottom: 12px; }
    .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .currency-symbol { font-size: 22px; font-weight: 600; }
    .currency-symbol.usd { color: #2575c9; }
    .currency-symbol.eur { color: #0f8060; }
    .currency-name { font-size: 13px; color: #888; }
    .rate-row { display: flex; align-items: baseline; justify-content: space-between; }
    .rate { font-size: 36px; font-weight: 600; color: #1a1a1a; letter-spacing: -1px; }
    .rate-label { font-size: 13px; color: #aaa; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .mini-card { background: #eeeee8; border-radius: 12px; padding: 0.85rem 1rem; }
    .mini-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .mini-value { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    button { width: 100%; padding: 12px; font-size: 15px; font-weight: 500; border-radius: 12px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; }
    button:active { background: #f0f0eb; }
    button:disabled { opacity: 0.5; }
    .source { font-size: 11px; color: #bbb; text-align: center; margin-top: 1rem; }
    .error-msg { font-size: 11px; color: #c0392b; text-align: center; margin-top: 8px; background: #fdf0f0; border-radius: 8px; padding: 8px; display: none; }
    @keyframes flash { 0%{opacity:0.2} 100%{opacity:1} }
    .flash { animation: flash 0.6s ease-out; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; }
      .card { background: #252522; border-color: #333; }
      header h1 { color: #f0f0ec; }
      .rate { color: #f0f0ec; }
      .mini-card { background: #2e2e2a; }
      .mini-value { color: #f0f0ec; }
      button { background: #252522; border-color: #444; color: #f0f0ec; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>שערי חליפין</h1>
      <span id="update-time">טוען...</span>
    </header>

    <div class="card">
      <div class="card-header">
        <span class="currency-symbol usd">$</span>
        <span class="currency-name">דולר אמריקאי · USD</span>
      </div>
      <div class="rate-row">
        <span class="rate" id="usd-rate">—</span>
        <span class="rate-label">₪ לדולר</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="currency-symbol eur">€</span>
        <span class="currency-name">אירו · EUR</span>
      </div>
      <div class="rate-row">
        <span class="rate" id="eur-rate">—</span>
        <span class="rate-label">₪ לאירו</span>
      </div>
    </div>

    <div class="mini-grid">
      <div class="mini-card">
        <div class="mini-label">€/$ כעת</div>
        <div class="mini-value" id="eurusd-rate">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">עדכון אחרון</div>
        <div class="mini-value" id="last-updated">—</div>
      </div>
    </div>

    <button onclick="fetchRates()" id="refresh-btn">רענן שערים</button>
    <div class="error-msg" id="error-msg"></div>
    <p class="source" id="source-label">שער פורקס חי · מתעדכן כל דקה</p>
  </div>

  <script>
    let prevUsd = null, prevEur = null;

    function flash(id) {
        const el = document.getElementById(id);
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
    }

    async function fetchRates() {
        const btn = document.getElementById('refresh-btn');
        const errEl = document.getElementById('error-msg');
        btn.textContent = 'טוען...';
        btn.disabled = true;
        errEl.style.display = 'none';

        try {
            let usd, eur;
            
            // ניסיון א': להביא נתונים מ-Frankfurter (יציב מאוד, ללא פרוקסי)
            try {
                const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=ILS,EUR');
                const data = await response.json();
                usd = data.rates.ILS;
                eur = (1 / data.rates.EUR) * data.rates.ILS;
                document.getElementById('source-label').textContent = 'מקור: Frankfurter (שער יציג)';
            } catch (e) {
                // ניסיון ב': אם א' נכשל, מנסים את Yahoo דרך פרוקסי חלופי
                const proxy = 'https://api.allorigins.win/get?url=';
                const target = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/USDILS=X?interval=1m&range=1d');
                const res = await fetch(proxy + target + '&t=' + Date.now());
                const json = await res.json();
                const result = JSON.parse(json.contents);
                usd = result.chart.result[0].meta.regularMarketPrice;
                // חישוב יורו משוער או משיכה נוספת
                eur = usd * 1.08; // הערכה גסה למקרה חירום
                document.getElementById('source-label').textContent = 'מקור: Yahoo Finance (פרוקסי)';
            }

            // עדכון הממשק
            const usdEl = document.getElementById('usd-rate');
            const eurEl = document.getElementById('eur-rate');

            if (prevUsd !== null && prevUsd.toFixed(2) !== usd.toFixed(2)) flash('usd-rate');
            
            usdEl.textContent = usd.toFixed(3);
            eurEl.textContent = eur.toFixed(3);
            document.getElementById('eurusd-rate').textContent = (eur / usd).toFixed(4);

            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleTimeString('he-IL');
            document.getElementById('update-time').textContent = now.toLocaleDateString('he-IL') + ' · ' + now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});

        } catch (err) {
            console.error(err);
            errEl.textContent = 'שגיאת תקשורת. נסה שוב בעוד כמה שניות.';
            errEl.style.display = 'block';
        } finally {
            btn.textContent = 'רענן שערים';
            btn.disabled = false;
        }
    }

    fetchRates();
    setInterval(fetchRates, 60000);
</script>
</body>
</html>
